services:
  postgres:
    image: postgres:16-alpine
    container_name: b612-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-b612}
      POSTGRES_USER: ${POSTGRES_USER:-b612}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-b612_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - b612_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-b612} -d ${POSTGRES_DB:-b612}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  b612_postgres_data:
